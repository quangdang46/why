name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features

  health-gate:
    name: Health regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Select health baseline
        id: health-baseline
        shell: bash
        run: |
          set -euo pipefail
          baseline_path="$RUNNER_TEMP/health-baseline.json"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" && git show FETCH_HEAD:.github/health-baseline.json > "$baseline_path" 2>/dev/null; then
              echo "Using baseline from origin/${{ github.base_ref }}"
            else
              cp .github/health-baseline.json "$baseline_path"
              echo "Using baseline from current checkout"
            fi
          else
            cp .github/health-baseline.json "$baseline_path"
            echo "Using baseline from current checkout"
          fi
          echo "path=$baseline_path" >> "$GITHUB_OUTPUT"

      - name: Run health regression gate
        run: |
          cargo run -p why-core --bin why -- health \
            --baseline-file "${{ steps.health-baseline.outputs.path }}" \
            --require-baseline \
            --max-regression 0 \
            --max-signal-regression time_bombs=0 \
            --max-signal-regression high_risk_files=0 \
            --max-signal-regression hotspot_files=0 \
            --max-signal-regression stale_hacks=0

  snapshots:
    name: Snapshot tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run snapshot tests when present
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tests/snapshot_reports.rs ]; then
            cargo test --test snapshot_reports
          else
            echo "tests/snapshot_reports.rs is not present yet; skipping snapshot job"
          fi

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  packaging-alignment:
    name: Packaging alignment audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify install/release/package metadata stay aligned
        shell: bash
        run: |
          set -euo pipefail

          package_name=$(python - <<'PY'
from pathlib import Path
import re
text = Path('crates/core/Cargo.toml').read_text()
match = re.search(r'^name\s*=\s*"([^"]+)"', text, re.M)
assert match, 'package name not found'
print(match.group(1))
PY
)

          publish_flag=$(python - <<'PY'
from pathlib import Path
import re
text = Path('crates/core/Cargo.toml').read_text()
match = re.search(r'^publish\s*=\s*(true|false)', text, re.M)
print(match.group(1) if match else 'true')
PY
)

          bin_name=$(python - <<'PY'
from pathlib import Path
import re
text = Path('crates/core/Cargo.toml').read_text()
match = re.search(r'\[\[bin\]\]\s*name\s*=\s*"([^"]+)"', text, re.S)
assert match, 'bin name not found'
print(match.group(1))
PY
)

          release_package=$(python - <<'PY'
from pathlib import Path
import re
text = Path('.github/workflows/release.yml').read_text()
match = re.search(r'PACKAGE_NAME:\s*([^\n]+)', text)
assert match, 'release PACKAGE_NAME not found'
print(match.group(1).strip())
PY
)

          release_bin=$(python - <<'PY'
from pathlib import Path
import re
text = Path('.github/workflows/release.yml').read_text()
match = re.search(r'BIN_NAME:\s*([^\n]+)', text)
assert match, 'release BIN_NAME not found'
print(match.group(1).strip())
PY
)

          installer_bin=$(python - <<'PY'
from pathlib import Path
import re
text = Path('install.sh').read_text()
match = re.search(r'^BINARY_NAME="([^"]+)"', text, re.M)
assert match, 'installer BINARY_NAME not found'
print(match.group(1))
PY
)

          if [ "$package_name" != "$release_package" ]; then
            echo "crates/core/Cargo.toml package '$package_name' does not match release workflow PACKAGE_NAME '$release_package'"
            exit 1
          fi

          if [ "$bin_name" != "$release_bin" ]; then
            echo "crates/core/Cargo.toml bin '$bin_name' does not match release workflow BIN_NAME '$release_bin'"
            exit 1
          fi

          if [ "$bin_name" != "$installer_bin" ]; then
            echo "crates/core/Cargo.toml bin '$bin_name' does not match installer BINARY_NAME '$installer_bin'"
            exit 1
          fi

          if [ "$publish_flag" = "false" ]; then
            echo "crates.io readiness check: shipping package '$package_name' still has publish = false"
          else
            echo "crates.io readiness check: shipping package '$package_name' is publishable"
          fi

  bench:
    name: Benchmark smoke check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks when present
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G 'benches/*.rs' > /dev/null; then
            cargo bench --workspace -- --output-format bencher | tee bench-output.txt
          else
            echo "No benchmark targets are present yet; skipping benchmark job"
          fi
