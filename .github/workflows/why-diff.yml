name: why diff PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  risk-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Detect diff-review support
        id: support
        shell: bash
        run: |
          set -euo pipefail
          if cargo run -q -p why-core -- diff-review --help >/dev/null; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "Current why CLI does not support diff-review yet; skipping PR risk review."
          fi

      - name: Stage pull request diff
        if: steps.support.outputs.supported == 'true'
        id: stage-diff
        shell: bash
        run: |
          set -euo pipefail
          git reset --mixed
          git diff --binary "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | git apply --cached --allow-empty
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No staged diff remained after applying the PR patch."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PR risk review
        if: steps.support.outputs.supported == 'true' && steps.stage-diff.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cargo run -q -p why-core -- diff-review --no-llm \
            --post-github-comment \
            --github-ref "#${{ github.event.pull_request.number }}"
